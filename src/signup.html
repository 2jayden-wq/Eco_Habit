<body style="margin: 0; font-family: sans-serif; background: #eee; display: flex; justify-content: center;">
    <main style="background: #fdf8ef; width: 100%; max-width: 400px; min-height: 100vh; padding: 40px 25px; box-sizing: border-box; text-align: center;">
        <header style="margin-bottom: 40px;">
            <h1 style="font-size: 2rem; color: #4a4a4a; margin: 0;">Welcome back!</h1>
            <p style="color: #8e8e8e; margin-top: 10px;">Log in to continue your journey.</p>
        </header>

        <form style="display: flex; flex-direction: column; gap: 15px;">
            <input type="email" placeholder="Email" style="padding: 15px; border-radius: 12px; border: 1px solid #ddd; font-size: 1rem;">
            <input type="password" placeholder="Password" style="padding: 15px; border-radius: 12px; border: 1px solid #ddd; font-size: 1rem;">
            <button type="submit" style="background: #72a372; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px;">Log In</button>
        </form>

        <p style="margin-top: 25px; font-size: 0.9rem; color: #8e8e8e;">
            Don't have an account? <a href="signup.html" style="color: #72a372; text-decoration: none; font-weight: bold;">Sign Up</a>
        </p>
    </main>
</body>
