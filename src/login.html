<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Eco Habit Tracker</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main class="auth-container">
        <header>
            <img src="" alt="Logo" class="logo">
            <h1>Welcome Back</h1>
            <p>Let's continue your growth journey</p>
        </header>

        <form action="/login" method="POST" class="auth-card">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="hello@example.com">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="*******">
            </div>

            <a href="" class="forgot-link">Forgot Password?</a>
            <button type="submit" class="btn"><a href="/src/index.html">Sign in</a></button>
        </form>

        <footer class="footer">
            <p>Don't have an account? <a href="signup.html">Create one</a></p>
        </footer>
    </main>
</body>
</html>
