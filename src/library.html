<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library | Eco Habit Tracker</title>
    <link rel="stylesheet" href="/src/css/library.css">
</head>
<body>

    <main class="container">
        <header>
            <h1>Explore Habits</h1>
            <p>Discover new ways to improve your life</p>
        </header>

        <div class="grid">
            <div class="card">
                <div class="icon" style="background:#e8effd; color:#4a90e2">💧</div>
                <h3>Drink Water</h3>
                <span class="tag">HEALTH</span>
                <button class="add">+ Add</button>
            </div>

            <div class="card">
                <div class="icon" style="background:#fff9e6; color:#f5a623">📖</div>
                <h3>Read 30 Mins</h3>
                <span class="tag">MIND</span>
                <button class="add">+ Add</button>
            </div>

            <div class="card">
                <div class="icon" style="background:#fff2e6; color:#f39c12">☀️</div>
                <h3>Morning Jog</h3>
                <span class="tag">FITNESS</span>
                <button class="add">+ Add</button>
            </div>

            <div class="card">
                <div class="icon" style="background:#f3effd; color:#9b59b6">🧠</div>
                <h3>Meditation</h3>
                <span class="tag">MIND</span>
                <button class="add">+ Add</button>
            </div>

            <div class="card">
                <div class="icon" style="background:#fdefee; color:#e74c3c">🏋️</div>
                <h3>Gym Workout</h3>
                <span class="tag">FITNESS</span>
                <button class="add">+ Add</button>
            </div>

            <div class="card custom">
                <div class="icon" style="background:#f4f7f2; color:#72a372">+</div>
                <h3>Create Custom</h3>
            </div>
        </div>

        <nav class="nav">
            <a href="index.html">🏠</a>
            <a href="library.html" class="active">📖<span>Library</span></a>
            <a href="progress.html">📊</a>
            <a href="settings.html">⚙️</a>
        </nav>
    </main>

</body>
</html>
