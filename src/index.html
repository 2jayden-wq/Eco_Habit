<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Habit Tracker</title>
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>

    <main class="app-body">
        <header class="header">
            <h1>Good morning! ☀️</h1>
            <p>You’re 3 days away from a record 🔥</p>
            
            <div class="progress-ring">
                <strong>0%</strong>
                <span>Daily Goal</span>
            </div>
        </header>

        <section class="habits">
            <div class="section-title">
                <h2>Today's Habits</h2>
                <span class="badge">4 remaining</span>
            </div>

            <div class="card water">
                <div class="card-text">
                    <time>8:00 AM</time>
                    <h3>Drink 2L of water</h3>
                    <small>12 day streak 🔥</small>
                </div>
                <button class="check-btn" aria-label="Complete"></button>
            </div>

            <div class="card read">
                <div class="card-text">
                    <time>ANYTIME</time>
                    <h3>Read 10 pages</h3>
                    <small>5 day streak 🔥</small>
                </div>
                <button class="check-btn" aria-label="Complete"></button>
            </div>

            <div class="card yoga">
                <div class="card-text">
                    <time>6:00 PM</time>
                    <h3>30 min yoga</h3>
                    <small>3 day streak 🔥</small>
                </div>
                <button class="check-btn" aria-label="Complete"></button>
            </div>
        </section>

        <nav class="navbar">
            <a href="index.html" class="active">🏠<span>Home</span></a>
            <a href="library.html">📖</a>
            <a href="progress.html">📊</a>
            <a href="settings.html">⚙️</a>
        </nav>
    </main>

</body>
</html>
