<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Eco Habit Tracker</title>
    <link rel="stylesheet" href="/css/settings.css">
</head>
<body>

    <main class="container">
        <header>
            <h1>Settings</h1>
            <p>Customize your experience</p>
        </header>

        <div class="card profile">
            <div class="profile-info">
                <img src="https://via.placeholder.com/60" alt="Avatar" class="avatar">
                <div>
                    <h2>Alex Johnson</h2>
                    <p>Free Plan</p>
                </div>
            </div>
            <button class="action-btn">👤 Edit Profile</button>
        </div>

        <div class="group">
            <h3 class="label">PREFERENCES</h3>
            <div class="card">
                <div class="item">
                    <div>
                        <h4>Daily Reminders</h4>
                        <p>Get notified at 9:00 AM</p>
                    </div>
                    <button class="toggle-btn active">ON</button>
                </div>
                <div class="item">
                    <div>
                        <h4>Dark Mode</h4>
                    </div>
                    <button class="toggle-btn">OFF</button>
                </div>
            </div>
        </div>

        <div class="group">
            <h3 class="label">PRIVACY</h3>
            <div class="card">
                <div class="item">
                    <div>
                        <h4>Private Profile</h4>
                        <p>Only friends can see progress</p>
                    </div>
                    <button class="toggle-btn active">ON</button>
                </div>
            </div>
        </div>

        <footer>
           <button type="submit" class="btn"><a href="login.html">Log Out</a></button>
          
        </footer>

        <nav class="nav">
            <a href="index.html">🏠</a>
            <a href="library.html">📖</a>
            <a href="progress.html">📊</a>
            <a href="settings.html" class="active">⚙️<span>Settings</span></a>
        </nav>
    </main>

</body>
</html>
