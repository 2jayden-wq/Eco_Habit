<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress | Eco Habit Tracker</title>
    <link rel="stylesheet" href="../src/css/progress.css">
</head>
<body>

    <main class="container">
        <header>
            <h1>Your Progress</h1>
            <p>You're doing great! Keep it up.</p>
        </header>

        <div class="stats-row">
            <div class="stat-card">
                <label>Current Streak</label>
                <div class="val streak">12 Days 🔥</div>
            </div>
            <div class="stat-card">
                <label>Completion Rate</label>
                <div class="val rate">87%</div>
            </div>
        </div>

        <div class="card">
            <h3>Weekly Overview</h3>
            <div class="graph">
                <div class="fill"></div>
            </div>
            <div class="labels"></div>
        </div>

        <div class="card">
            <h3>Monthly View</h3>
            <div class="grid">
                <div class="day done">1</div>
                <div class="day">2</div>
                <div class="day incomplete">3</div>
                <div class="day">4</div>
                <div class="day done">5</div>
                <div class="day incomplete">6</div>
                <div class="day done">7</div>
                <div class="day">8</div>
                <div class="day incomplete">9</div>
                <div class="day">10</div>
                <div class="day done">11</div>
                <div class="day">12</div>
                <div class="day incomplete">13</div>
                <div class="day">14</div>
                <div class="day done">15</div>
            </div>
        </div>

        <nav class="nav">
            <a href="index.html">🏠</a>
            <a href="library.html">📖</a>
            <a href="progress.html" class="active">📊<span>Progress</span></a>
            <a href="settings.html">⚙️</a>
        </nav>
    </main>

</body>
</html>
